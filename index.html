<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>AgentNews — Independent · Informed · Insightful</title>
    <meta name="description" content="The latest AI and technology news, sourced and enriched every few minutes. Independent, informed, insightful." />
    <meta name="theme-color" content="#1A1814" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicon suite -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph defaults (overridden per-page by react-helmet-async) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgentNews" />
    <meta property="og:title" content="AgentNews — Independent · Informed · Insightful" />
    <meta property="og:description" content="The latest AI and technology news, sourced and enriched every few minutes." />
    <meta property="og:image" content="https://theagentnews.com/og-image.svg" />
    <meta property="og:url" content="https://theagentnews.com" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@theagentnews" />
    <meta name="twitter:title" content="AgentNews — Independent · Informed · Insightful" />
    <meta name="twitter:description" content="The latest AI and technology news, sourced and enriched every few minutes." />
    <meta name="twitter:image" content="https://theagentnews.com/og-image.svg" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- RSS autodiscovery -->
    <link rel="alternate" type="application/rss+xml" title="AgentNews RSS Feed" href="https://api.theagentnews.com/api/rss" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
